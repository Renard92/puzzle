<!DOCTYPE html>
<html>
<style>
  * { box-sizing: border-box; }
  .wrap {
      height: 100%;
    background: #111110;
    min-height: 420px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2rem;
  }
  .key {
    width: 64px; height: 64px;
    border: 0.5px solid #3a3a38;
    border-radius: 8px;
    background: #1a1a18;
    font-size: 24px; font-weight: 500;
    color: #e8e6df;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans);
    transition: background 0.08s, transform 0.07s;
    user-select: none;
  }
  .key:hover { background: #252523; }
  .key:active { transform: scale(0.91); }
  .slot {
    width: 48px; height: 58px;
    border-bottom: 2.5px solid #3a3a38;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 500;
    font-family: var(--font-sans);
    color: #e8e6df;
    transition: border-color 0.15s;
  }
  .slot.active { border-color: #888780; }
  .slot.wrong { border-color: #E24B4A; }
  .icon-btn {
    width: 64px; height: 64px;
    border: 0.5px solid #3a3a38;
    border-radius: 8px;
    background: #1a1a18;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.08s, transform 0.07s;
    padding: 0;
  }
  .icon-btn:hover { background: #252523; }
  .icon-btn:active { transform: scale(0.91); }
</style>

<div class="wrap">
  <div id="slots" style="display:flex;gap:16px;justify-content:center;">
    <div class="slot active" id="s0"></div>
    <div class="slot" id="s1"></div>
    <div class="slot" id="s2"></div>
    <div class="slot" id="s3"></div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,64px);gap:10px;">
    <button class="key" onclick="press('A')">A</button>
    <button class="key" onclick="press('B')">B</button>
    <button class="key" onclick="press('C')">C</button>
    <button class="key" onclick="press('D')">D</button>
    <button class="key" onclick="press('E')">E</button>
    <button class="key" onclick="press('F')">F</button>
    <button class="key" onclick="press('G')">G</button>
    <button class="key" onclick="press('H')">H</button>
    <button class="key" onclick="press('I')">I</button>
  </div>

  <div style="display:flex;gap:10px;align-items:center;">
    <button class="icon-btn" onclick="erase()">
      <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
        <path d="M7 1H18C19.1 1 20 1.9 20 3V13C20 14.1 19.1 15 18 15H7L1 8L7 1Z" stroke="#888780" stroke-width="1" fill="none"/>
        <line x1="10" y1="5.5" x2="16" y2="11.5" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="16" y1="5.5" x2="10" y2="11.5" stroke="#888780" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="icon-btn" onclick="validate()">
      <svg width="32" height="26" viewBox="0 0 64 52" fill="none">
        <path d="M6 8 L18 2 L22 13 L26 5 L32 10 L38 5 L42 13 L46 2 L58 8 L52 20 Q48 36 32 46 Q16 36 12 20 Z" fill="#E24B4A"/>
        <path d="M6 8 L18 2 L22 13" fill="#FAC775"/>
        <path d="M46 2 L58 8 L52 20" fill="#FAC775"/>
        <circle cx="24" cy="22" r="3" fill="#e8e6df"/>
        <circle cx="40" cy="22" r="3" fill="#e8e6df"/>
        <path d="M27 31 Q32 36 37 31" stroke="#e8e6df" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="32" cy="34" rx="5" ry="3" fill="#F7C1C1"/>
      </svg>
    </button>
  </div>

  <div id="msg" style="font-size:14px;font-weight:500;min-height:20px;text-align:center;color:#888780;"></div>
</div>

<script>
  const PASSWORD = ['H','C','F','I'];
  const LEN = 4;
  let input = [];
  let locked = false;

  function updateSlots() {
    for (let i = 0; i < LEN; i++) {
      const s = document.getElementById('s' + i);
      s.textContent = input[i] || '';
      s.className = 'slot';
      if (i === input.length && !locked) s.classList.add('active');
    }
  }

  function press(l) {
    if (locked || input.length >= LEN) return;
    input.push(l);
    updateSlots();
    document.getElementById('msg').textContent = '';
  }

  function erase() {
    if (locked) return;
    input.pop();
    updateSlots();
    document.getElementById('msg').textContent = '';
  }

  function validate() {
    if (locked) return;
    if (input.length < LEN) {
      setMsg('Saisis encore ' + (LEN - input.length) + ' lettre(s).', '#888780');
      return;
    }
    const ok = input.every((l, i) => l === PASSWORD[i]);
    if (ok) {
      setMsg('✓ Accès autorisé', '#5DCAA5');
      locked = true;
    } else {
      for (let i = 0; i < LEN; i++) {
        document.getElementById('s' + i).className = 'slot wrong';
      }
      setMsg('Combinaison incorrecte', '#E24B4A');
      setTimeout(() => {
        input = [];
        locked = false;
        updateSlots();
        document.getElementById('msg').textContent = '';
      }, 1200);
    }
  }

  function setMsg(txt, color) {
    const m = document.getElementById('msg');
    m.textContent = txt;
    m.style.color = color;
  }

  document.addEventListener('keydown', e => {
    const k = e.key.toUpperCase();
    if ('ABCDEFGHI'.includes(k) && k.length === 1) press(k);
    if (e.key === 'Backspace') erase();
    if (e.key === 'Enter') validate();
  });
</script>
</html>
